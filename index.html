<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    header {
      background-color: #001f3f;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      max-width: 220px;
      filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.5));
    }

    .kq105-logo {
      max-height: 40px;
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    .event-section {
      background-color: #16213e;
      padding: 1rem;
      border-radius: 10px;
    }

    .event-section h2 {
      border-bottom: 2px solid #00adb5;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .countdown-box {
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #112d4e;
      border-radius: 8px;
      font-size: 1.1rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .right-panel {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" class="logo" />
    <a href="https://kq105.vercel.app" target="_blank">
      <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" alt="KQ105" class="kq105-logo">
    </a>
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <div class="event-section">
        <h2>🎬 Eventos</h2>

        <div class="event-card">
          <h3>🏀 NBA – Boston Celtics vs. New York Knicks</h3>
          <p>Hoy a las 7:00 p.m.</p>
          <div class="countdown-box" id="countdown1"></div>
        </div>

        <div class="event-card">
          <h3>🏀 NBA – Golden State Warriors vs. Minnesota Timberwolves</h3>
          <p>Hoy a las 9:30 p.m.</p>
          <div class="countdown-box" id="countdown2"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    function updateCountdown(targetId, hour, minute) {
      const now = new Date();
      const target = new Date();
      target.setHours(hour, minute, 0, 0);
      if (now > target) return document.getElementById(targetId).textContent = "Ya comenzó.";

      const diff = target - now;
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById(targetId).textContent = `Comienza en ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(() => {
      updateCountdown("countdown1", 19, 0); // 7:00 p.m.
      updateCountdown("countdown2", 21, 30); // 9:30 p.m.
    }, 1000);
  </script>
</body>
</html>
