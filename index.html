<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    header {
      background-color: #001f3f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
    }

    .logo {
      max-width: 180px;
      filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.5));
    }

    .kq105-link img {
      height: 40px;
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    .right-panel h2 {
      border-bottom: 2px solid #00adb5;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .countdown {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      background-color: #003554;
      padding: 0.5rem;
      border-radius: 8px;
      text-align: center;
    }

    a.kq105-link {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" class="logo" />
    <a href="https://kq105.vercel.app" class="kq105-link" target="_blank">
      <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" alt="KQ105 Logo">
    </a>
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Eventos</h2>

      <div class="event-card">
        <h3>🏀 NBA – Boston Celtics vs New York Knicks</h3>
        <p><strong>Hora:</strong> 7:00 p.m</p>
        <div class="countdown" id="countdown1">Cargando...</div>
      </div>

      <div class="event-card">
        <h3>🏀 NBA – Golden State Warriors vs Minnesota Timberwolves</h3>
        <p><strong>Hora:</strong> 9:30 p.m</p>
        <div class="countdown" id="countdown2">Cargando...</div>
      </div>
    </div>
  </div>

  <script>
    new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    function startCountdown(id, eventTime) {
      function updateCountdown() {
        const now = new Date();
        const diff = eventTime - now;
        const countdown = document.getElementById(id);

        if (diff <= 0) {
          countdown.textContent = "¡Ya comenzó!";
          clearInterval(interval);
          return;
        }

        const hours = String(Math.floor(diff / (1000 * 60 * 60))).padStart(2, '0');
        const minutes = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        const seconds = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');

        countdown.textContent = `${hours}:${minutes}:${seconds}`;
      }

      updateCountdown();
      const interval = setInterval(updateCountdown, 1000);
    }

    // Fechas en formato: Año, Mes (0-11), Día, Hora, Minuto
    const today = new Date();
    const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();

    startCountdown("countdown1", new Date(y, m, d, 19, 0, 0));  // 7:00 PM
    startCountdown("countdown2", new Date(y, m, d, 21, 30, 0)); // 9:30 PM
  </script>
</body>
</html>
