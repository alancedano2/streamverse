<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos en Vivo</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0055ff, #6f00ff);
      color: white;
    }

    .event {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 800px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease-in-out;
    }

    .event h2 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    .event p {
      margin: 5px 0 15px;
      font-weight: 500;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }

    .player {
      width: 100%;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      .event {
        padding: 15px;
      }

      iframe, .player {
        height: 250px;
      }
    }
  </style>
</head>
<body>

  <!-- Evento 1 -->
  <div class="event">
    <h2>MLB: Pittsburgh Pirates vs Cincinnati Reds</h2>
    <p>Hora: 11:30 AM</p>
    <iframe src="https://streamtp4.com/global1.php?stream=mlb1" allowfullscreen></iframe>
  </div>

  <!-- Evento 2 -->
  <div class="event">
    <h2>MLB: New York Yankees vs Texas Rangers</h2>
    <p>Hora: 6:00 PM</p>
    <iframe src="https://streamtp4.com/global1.php?stream=mlb11" allowfullscreen></iframe>
  </div>

  <!-- Evento 3 -->
  <div class="event">
    <h2>NBA: New York Knicks vs Indiana Pacers</h2>
    <p>Hora: 7:00 PM</p>
    <div id="player-nba" class="player"></div>
  </div>

  <!-- Evento 4 -->
  <div class="event">
    <h2>AEW: Dynamite</h2>
    <p>Hora: 7:00 PM</p>
    <iframe src="https://streamtp4.com/global1.php?stream=tsn2" allowfullscreen></iframe>
  </div>

  <script>
    // Reproductor Clappr para evento NBA
    new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player-nba",
      autoPlay: true,
      mute: false,
      height: "100%",
      width: "100%",
      mediacontrol: { seekbar: "#00BFFF", buttons: "#ffffff" },
    });
  </script>

</body>
</html>
