<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cuenta Regresiva</title>
  <style>
    body {
      background: #0a1f44;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .countdown-box {
      margin: 2rem auto;
      background: #1f4068;
      padding: 2rem;
      border-radius: 12px;
      max-width: 400px;
      box-shadow: 0 0 10px #00adb5;
    }
    .event-title {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }
    .countdown {
      font-size: 2rem;
      font-family: 'Courier New', Courier, monospace;
      background: #00adb5;
      color: #001f3f;
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      min-width: 180px;
    }
  </style>
</head>
<body>

  <div class="countdown-box">
    <div class="event-title">🏀 Celtics vs Knicks – 7:00 PM</div>
    <div class="countdown" id="countdown-1">Cargando...</div>
  </div>

  <div class="countdown-box">
    <div class="event-title">🏀 Warriors vs Timberwolves – 9:30 PM</div>
    <div class="countdown" id="countdown-2">Cargando...</div>
  </div>

  <script>
    function iniciarCuentaRegresiva(id, horaObjetivo, minutoObjetivo) {
      const elemento = document.getElementById(id);

      function actualizar() {
        const ahoraUTC = new Date();
        const ahoraPR = new Date(ahoraUTC.getTime() - (4 * 60 * 60 * 1000)); // UTC-4

        let evento = new Date(
          ahoraPR.getFullYear(),
          ahoraPR.getMonth(),
          ahoraPR.getDate(),
          horaObjetivo,
          minutoObjetivo,
          0
        );

        // Si ya pasó la hora, usar el siguiente día
        if (ahoraPR > evento) {
          evento.setDate(evento.getDate() + 1);
        }

        let diff = evento - ahoraPR;

        if (diff <= 0) {
          elemento.textContent = "¡En vivo ahora!";
          return;
        }

        let horas = Math.floor(diff / (1000 * 60 * 60));
        let minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let segundos = Math.floor((diff % (1000 * 60)) / 1000);

        elemento.textContent =
          (horas < 10 ? "0" + horas : horas) + ":" +
          (minutos < 10 ? "0" + minutos : minutos) + ":" +
          (segundos < 10 ? "0" + segundos : segundos);
      }

      actualizar();
      setInterval(actualizar, 1000);
    }

    iniciarCuentaRegresiva("countdown-1", 19, 0);   // 7:00 PM
    iniciarCuentaRegresiva("countdown-2", 21, 30);  // 9:30 PM
  </script>
</body>
</html>
