<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stream Eventos</title>
<style>
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1E3C72, #2A5298);
    color: white;
  }
  /* Navbar */
  #navbar {
    height: 50px;
    background-color: #0D2240;
    display: flex;
    align-items: center;
    padding: 0 15px;
  }
  #navbar img {
    height: 36px;
  }
  /* Contenedor principal */
  #main {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
  }
  /* Zona eventos */
  #events {
    flex: 1 1 320px;
    max-width: 400px;
  }
  .event-card {
    background: rgba(255 255 255 / 0.12);
    margin-bottom: 20px;
    padding: 15px 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgb(255 255 255 / 0.1);
    transition: background-color 0.3s ease;
  }
  .event-card:hover {
    background: rgba(255 255 255 / 0.2);
  }
  .event-title {
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 10px;
  }
  .timer-box {
    background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
    padding: 8px 16px;
    border-radius: 25px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    width: fit-content;
    margin-bottom: 12px;
    box-shadow: 0 0 10px #00c0ffaa;
  }
  button.view-btn {
    background-color: #ff9800;
    border: none;
    color: #222;
    padding: 10px 22px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 700;
    font-size: 1rem;
    transition: background-color 0.25s ease;
    box-shadow: 0 3px 6px rgb(255 152 0 / 0.5);
  }
  button.view-btn:hover {
    background-color: #e07b00;
    box-shadow: 0 4px 10px rgb(224 123 0 / 0.75);
  }

  /* Zona reproductor con aspect ratio 16:9 */
  #player {
    flex: 2 1 640px;
    max-width: 900px;
    position: relative;
    border-radius: 12px;
    box-shadow: 0 0 30px rgb(255 255 255 / 0.15);
    overflow: hidden;
    background: #000;
    width: 100%;
  }
  /* Aspect ratio container 16:9 */
  #player-inner {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 ratio */
  }
  #player iframe,
  #player video,
  #player canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Advertencia modal dentro del player */
  #warning-modal {
    display: none;
    position: absolute;
    top: 10%;
    left: 10%;
    right: 10%;
    bottom: 10%;
    background-color: rgba(0,0,0,0.85);
    border-radius: 12px;
    z-index: 2000;
    color: white;
    font-size: 1rem;
    padding: 25px 30px;
    box-shadow: 0 0 25px #00aaffcc;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease forwards;
    text-align: center;
  }
  #warning-modal p {
    margin-bottom: 25px;
    line-height: 1.4;
  }
  #warning-modal button {
    margin: 0 10px;
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    font-size: 1rem;
    min-width: 110px;
    transition: background-color 0.3s ease;
  }
  #accept-btn {
    background-color: #28a745;
    color: white;
    box-shadow: 0 4px 12px #28a745cc;
  }
  #accept-btn:hover {
    background-color: #218838;
  }
  #cancel-btn {
    background-color: #dc3545;
    color: white;
    box-shadow: 0 4px 12px #dc3545cc;
  }
  #cancel-btn:hover {
    background-color: #c82333;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }

  /* Responsive */
  @media (max-width: 700px) {
    #main {
      flex-direction: column;
      padding: 15px;
    }
    #player {
      max-width: 100%;
      margin-top: 15px;
    }
    #events {
      max-width: 100%;
    }
  }
</style>
</head>
<body>

<div id="navbar">
  <img src="logo.png" alt="Logo" />
</div>

<div id="main">
  <div id="events" aria-label="Lista de eventos">
    <!-- Eventos generados por JS -->
  </div>
  <div id="player" aria-label="Reproductor de video">
    <div id="player-inner">
      <!-- Aquí va el iframe o Clappr -->
      <!-- Aquí va la advertencia también -->
      <div id="warning-modal" role="dialog" aria-modal="true" aria-labelledby="warning-title">
        <p id="warning-title">Este contenido puede contener anuncios, popups y otros elementos molestos.<br>¿Deseas continuar viendo?</p>
        <div>
          <button id="accept-btn" aria-label="Aceptar ver contenido">Aceptar</button>
          <button id="cancel-btn" aria-label="Cancelar y cerrar advertencia">Cancelar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
<script>
  const events = [
    {
      title: "MLB: Pittsburgh Pirates vs Cincinnati Reds",
      time: "11:30",
      type: "iframe",
      url: "https://streamtp4.com/global1.php?stream=mlb1"
    },
    {
      title: "MLB: New York Yankees vs Texas Rangers",
      time: "18:00",
      type: "iframe",
      url: "https://streamtp4.com/global1.php?stream=mlb11"
    },
    {
      title: "NBA: New York Knicks vs Indiana Pacers",
      time: "19:00",
      type: "clappr",
      url: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8"
    },
    {
      title: "AEW: Dynamite",
      time: "19:00",
      type: "iframe",
      url: "https://streamtp4.com/global1.php?stream=tsn2"
    }
  ];

  const eventsContainer = document.getElementById('events');
  const playerInner = document.getElementById('player-inner');
  const warningModal = document.getElementById('warning-modal');
  const acceptBtn = document.getElementById('accept-btn');
  const cancelBtn = document.getElementById('cancel-btn');

  let currentEventIndex = null;
  let clapprPlayer = null;

  function getCountdown(targetHour, targetMinute) {
    const now = new Date();
    let target = new Date();
    target.setHours(targetHour, targetMinute, 0, 0);
    if (now > target) return null;
    const diffMs = target - now;
    const h = Math.floor(diffMs / (1000 * 60 * 60));
    const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diffMs % (1000 * 60)) / 1000);
    return { h, m, s };
  }

  // Crear tarjeta evento
  function createEventCard(ev, i) {
    const card = document.createElement('div');
    card.className = 'event-card';

    const title = document.createElement('div');
    title.className = 'event-title';
    title.textContent = ev.title;
    card.appendChild(title);

    const [h, m] = ev.time.split(':').map(x => parseInt(x));
    const timer = document.createElement('div');
    timer.className = 'timer-box';
    timer.id = `timer-${i}`;
    timer.textContent = "Calculando...";
    card.appendChild(timer);

    const btn = document.createElement('button');
    btn.className = 'view-btn';
    btn.textContent = 'Ver';
    btn.setAttribute('aria-label', `Ver evento ${ev.title}`);
    btn.addEventListener('click', () => handleViewClick(i));
    card.appendChild(btn);

    // Actualizar timer cada segundo
    function updateTimer() {
      const c = getCountdown(h, m);
      if(!c) {
        timer.textContent = "¡EN VIVO!";
        timer.style.background = "linear-gradient(90deg, #ff416c, #ff4b2b)";
      } else {
        timer.style.background = "linear-gradient(90deg, #4facfe 0%, #00f2fe 100%)";
        timer.textContent = `${String(c.h).padStart(2,'0')}:${String(c.m).padStart(2,'0')}:${String(c.s).padStart(2,'0')}`;
      }
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    return card;
  }

  // Cargar iframe sin sandbox
  function loadIframe(url) {
    removePlayerContent();
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.allowFullscreen = true;
    iframe.allow = "autoplay; fullscreen";
    iframe.setAttribute('allowfullscreen', '');
    playerInner.appendChild(iframe);
  }

  // Cargar Clappr player
  function loadClappr(url) {
    removePlayerContent();
    const playerDiv = document.createElement('div');
    playerDiv.id = 'clappr-player';
    playerInner.appendChild(playerDiv);

    clapprPlayer = new Clappr.Player({
      source: url,
      parentId: '#clappr-player',
      width: '100%',
      height: '100%',
      autoPlay: true,
      mute: false,
      mediacontrol: {seekbar: "#00f2fe"},
      watermark: false,
    });
  }

  // Limpiar contenido player
  function removePlayerContent() {
    if(clapprPlayer) {
      clapprPlayer.destroy();
      clapprPlayer = null;
    }
    while(playerInner.firstChild) {
      playerInner.removeChild(playerInner.firstChild);
    }
  }

  // Manejar click en botón ver
  function handleViewClick(index) {
    const event = events[index];
    currentEventIndex = index;
    if(event.url.includes('streamtp4.com')) {
      showWarning();
    } else {
      hideWarning();
      if(event.type === 'iframe') loadIframe(event.url);
      else if(event.type === 'clappr') loadClappr(event.url);
    }
  }

  // Mostrar advertencia dentro del player con fade
  function showWarning() {
    warningModal.style.display = 'flex';
    warningModal.style.opacity = 0;
    let op = 0;
    const fadeInTimer = setInterval(() => {
      if(op >= 1) clearInterval(fadeInTimer);
      warningModal.style.opacity = op;
      op += 0.1;
    }, 30);
  }

  // Ocultar advertencia
  function hideWarning() {
    warningModal.style.display = 'none';
  }

  // Botones modal
  acceptBtn.addEventListener('click', () => {
    hideWarning();
    const event = events[currentEventIndex];
    if(event.type === 'iframe') loadIframe(event.url);
    else if(event.type === 'clappr') loadClappr(event.url);
  });
  cancelBtn.addEventListener('click', () => {
    hideWarning();
  });

  // Cargar eventos al iniciar
  events.forEach((ev, i) => {
    const card = createEventCard(ev, i);
    eventsContainer.appendChild(card);
  });
</script>

</body>
</html>
