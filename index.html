<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    header {
      background-color: #001f3f;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      max-width: 180px;
      filter: drop-shadow(0px 0px 6px rgba(255, 255, 255, 0.5));
    }

    .kq105-logo {
      max-height: 40px;
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .left-panel {
      flex: 3;
      min-width: 300px;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      min-width: 280px;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .countdown {
      font-size: 1.2rem;
      margin-top: 0.5rem;
      color: #fff;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="StreamVerse Logo" class="logo" />
    <a href="https://kq105.vercel.app" target="_blank">
      <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" class="kq105-logo" alt="KQ105" />
    </a>
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Eventos</h2>

      <div class="event-card">
        <h3>🏀 Boston Celtics vs. New York Knicks</h3>
        <p>Hoy a las 7:00 PM</p>
        <div class="countdown" id="countdown1">Cargando...</div>
      </div>

      <div class="event-card">
        <h3>🏀 Golden State Warriors vs. Minnesota Timberwolves</h3>
        <p>Hoy a las 9:30 PM</p>
        <div class="countdown" id="countdown2">Cargando...</div>
      </div>
    </div>
  </div>

  <script>
    var player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    function startCountdown(id, targetHour, targetMinute) {
      const countdownEl = document.getElementById(id);
      function updateCountdown() {
        const now = new Date();
        const target = new Date();
        target.setHours(targetHour, targetMinute, 0, 0);

        if (now > target) {
          countdownEl.textContent = "En vivo o finalizado";
          return;
        }

        const diff = target - now;
        const hours = Math.floor(diff / 1000 / 60 / 60);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        countdownEl.textContent = `Faltan ${hours}h ${minutes}m ${seconds}s`;
        requestAnimationFrame(updateCountdown);
      }
      updateCountdown();
    }

    // Iniciar cuentas regresivas
    startCountdown("countdown1", 19, 0); // 7:00 PM
    startCountdown("countdown2", 21, 30); // 9:30 PM
  </script>
</body>
</html>
