<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos en Vivo</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom right, #003366, #336699);
      font-family: Arial, sans-serif;
      color: white;
    }

    .player-container {
      width: 100%;
      max-width: 960px;
      margin: auto;
      padding: 10px;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 960px;
      margin: 30px auto;
      padding: 10px;
    }

    .event-card {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
    }

    .event-card h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .countdown {
      font-size: 18px;
      margin: 10px 0;
    }

    .ver-btn {
      background-color: #00ccff;
      color: black;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .ver-btn:hover {
      background-color: #00aacc;
    }

    iframe {
      width: 100%;
      height: 480px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <div id="player"></div>
  </div>

  <div class="event-list">
    <div class="event-card">
      <h2>MLB: Pittsburgh Pirates vs Cincinnati Reds - 11:30am</h2>
      <div class="countdown" id="countdown1"></div>
      <button class="ver-btn" onclick="loadStream('https://streamtp4.com/global1.php?stream=mlb1')">Ver</button>
    </div>

    <div class="event-card">
      <h2>MLB: New York Yankees vs Texas Rangers - 6:00pm</h2>
      <div class="countdown" id="countdown2"></div>
      <button class="ver-btn" onclick="loadStream('https://streamtp4.com/global1.php?stream=mlb11')">Ver</button>
    </div>

    <div class="event-card">
      <h2>NBA: New York Knicks vs Indiana Pacers - 7:00pm</h2>
      <div class="countdown" id="countdown3"></div>
      <button class="ver-btn" onclick="loadStream('https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8')">Ver</button>
    </div>

    <div class="event-card">
      <h2>AEW: Dynamite - 7:00pm</h2>
      <div class="countdown" id="countdown4"></div>
      <button class="ver-btn" onclick="loadStream('https://streamtp4.com/global1.php?stream=tsn2')">Ver</button>
    </div>
  </div>

  <script>
    let playerInstance = null;

    function loadStream(url) {
      const container = document.getElementById("player");
      container.innerHTML = ''; // Limpia el contenedor

      if (url.endsWith(".m3u8")) {
        // Mostrar Clappr
        playerInstance = new Clappr.Player({
          source: url,
          parentId: '#player',
          width: '100%',
          height: '480px',
          autoPlay: true
        });
      } else {
        // Mostrar iframe
        const iframe = document.createElement("iframe");
        iframe.src = url;
        container.appendChild(iframe);
      }
    }

    function updateCountdown(elementId, targetHour, targetMinute) {
      const now = new Date();
      const target = new Date();
      target.setHours(targetHour, targetMinute, 0, 0);
      if (target < now) target.setDate(target.getDate() + 1);

      const diff = target - now;

      const hours = Math.floor(diff / 1000 / 60 / 60);
      const minutes = Math.floor((diff / 1000 / 60) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById(elementId).innerText = 
        `${hours}h ${minutes}m ${seconds}s`;

      setTimeout(() => updateCountdown(elementId, targetHour, targetMinute), 1000);
    }

    function initCountdowns() {
      updateCountdown('countdown1', 11, 30);
      updateCountdown('countdown2', 18, 0);
      updateCountdown('countdown3', 19, 0);
      updateCountdown('countdown4', 19, 0);
    }

    initCountdowns();
  </script>

</body>
</html>
