<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos Deportivos</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #001f3f, #003366);
      color: #fff;
    }
    header {
      background-color: #000c1a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }
    header img {
      height: 40px;
    }
    .container {
      padding: 20px;
    }
    .event-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      gap: 16px;
    }
    .event-card {
      flex: 0 0 auto;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 16px;
      border-radius: 12px;
      min-width: 300px;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
    }
    .event-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .timer {
      background-color: rgba(255,255,255,0.1);
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .watch-btn {
      background-color: #007bff;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .watch-btn:hover {
      background-color: #0056b3;
    }
    iframe, #video-player {
      width: 100%;
      height: calc(100vw * 9 / 16);
      max-height: 70vh;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" />
  </header>
  <div class="container">
    <div id="player-container"></div>
    <div class="event-list">
      <div class="event-card">
        <div class="event-title">MLB: Pittsburgh Pirates vs Cincinnati Reds</div>
        <div class="timer" data-time="2025-05-21T11:30:00-04:00"></div>
        <button class="watch-btn" data-type="iframe" data-src="https://streamtp4.com/global1.php?stream=mlb1">Ver</button>
      </div>
      <div class="event-card">
        <div class="event-title">MLB: New York Yankees vs Texas Rangers</div>
        <div class="timer" data-time="2025-05-21T18:00:00-04:00"></div>
        <button class="watch-btn" data-type="iframe" data-src="https://streamtp4.com/global1.php?stream=mlb11">Ver</button>
      </div>
      <div class="event-card">
        <div class="event-title">NBA: New York Knicks vs Indiana Pacers</div>
        <div class="timer" data-time="2025-05-21T19:00:00-04:00"></div>
        <button class="watch-btn" data-type="clappr" data-src="https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8">Ver</button>
      </div>
      <div class="event-card">
        <div class="event-title">AEW: Dynamite</div>
        <div class="timer" data-time="2025-05-21T19:00:00-04:00"></div>
        <button class="watch-btn" data-type="iframe" data-src="https://streamtp4.com/global1.php?stream=tsn2">Ver</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script>
    const timers = document.querySelectorAll('.timer');
    const now = new Date();
    timers.forEach(timer => {
      const eventTime = new Date(timer.dataset.time);
      if (now > eventTime) {
        timer.textContent = "Ya comenzó";
      } else {
        const diff = eventTime - now;
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        timer.textContent = `Comienza en ${hours}h ${minutes}m`;
      }
    });

    document.querySelectorAll('.watch-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const container = document.getElementById('player-container');
        container.innerHTML = '';
        const type = btn.dataset.type;
        const src = btn.dataset.src;
        if (type === 'clappr') {
          new Clappr.Player({
            source: src,
            parentId: "#player-container",
            width: '100%',
            height: '100%'
          });
        } else if (type === 'iframe') {
          const iframe = document.createElement('iframe');
          iframe.src = src;
          iframe.allow = "encrypted-media";
          iframe.allowFullscreen = true;
          container.appendChild(iframe);
        }
      });
    });
  </script>
</body>
</html>
