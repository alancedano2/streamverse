<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    header {
      background-color: #001f3f;
      padding: 1rem;
      text-align: center;
    }

    .logo {
      max-width: 220px;
      filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.5));
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    .right-panel h2 {
      border-bottom: 2px solid #00adb5;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .countdown {
      margin-top: 0.5rem;
      background-color: #001f3f;
      padding: 0.5rem;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" class="logo" loading="lazy" />
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Eventos</h2>

      <div class="event-card">
        <h3>🏀 NBA – Celtics vs Knicks</h3>
        <p>Hora de inicio: <strong>Hoy a las 7:00 p.m.</strong></p>
        <div class="countdown" id="countdown1">Cargando cuenta regresiva...</div>
      </div>

      <div class="event-card">
        <h3>🏀 NBA – Warriors vs Timberwolves</h3>
        <p>Hora de inicio: <strong>Hoy a las 9:30 p.m.</strong></p>
        <div class="countdown" id="countdown2">Cargando cuenta regresiva...</div>
      </div>
    </div>
  </div>

  <script>
    var player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    // Configura la fecha de hoy para ambos juegos
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const date = now.getDate();

    const events = [
      {
        id: "countdown1",
        time: new Date(year, month, date, 19, 0, 0) // 7:00 PM
      },
      {
        id: "countdown2",
        time: new Date(year, month, date, 21, 30, 0) // 9:30 PM
      }
    ];

    function updateCountdown(id, time) {
      const now = new Date();
      const distance = time - now;

      if (distance < 0) {
        document.getElementById(id).innerText = "¡En vivo ahora!";
        return;
      }

      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById(id).innerText = `Faltan ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(() => {
      events.forEach(evt => updateCountdown(evt.id, evt.time));
    }, 1000);
  </script>
</body>
</html>
