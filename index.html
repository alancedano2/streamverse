<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    header {
      background-color: #001f3f;
      padding: 0.3rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 55px;
    }

    .logo {
      height: 35px;
      filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.5));
    }

    .nav-link {
      color: #00fff5;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      transition: color 0.3s;
    }

    .nav-link:hover {
      color: #00adb5;
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    .right-panel h2 {
      border-bottom: 2px solid #00adb5;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1.5rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .countdown {
      font-size: 1.2rem;
      color: #ffdb58;
      margin-top: 0.5rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" alt="KQ105 Logo" class="logo" />
    <a class="nav-link" href="https://kq105.vercel.app" target="_blank">KQ105</a>
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Eventos en Vivo</h2>

      <div class="event-card">
        <h3>🏀 NBA – Celtics vs. Knicks</h3>
        <p><strong>Hora:</strong> Hoy a las 7:00 p.m.</p>
        <div class="countdown" id="countdown1"></div>
      </div>

      <div class="event-card">
        <h3>🏀 NBA – Warriors vs. Timberwolves</h3>
        <p><strong>Hora:</strong> Hoy a las 9:30 p.m.</p>
        <div class="countdown" id="countdown2"></div>
      </div>
    </div>
  </div>

  <script>
    var player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    function startCountdown(elementId, targetHour, targetMinute) {
      const now = new Date();
      const target = new Date();
      target.setHours(targetHour);
      target.setMinutes(targetMinute);
      target.setSeconds(0);
      if (target < now) target.setDate(target.getDate() + 1);

      function updateCountdown() {
        const now = new Date();
        const diff = target - now;
        if (diff <= 0) {
          document.getElementById(elementId).innerText = "¡En vivo ahora!";
          return;
        }

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById(elementId).innerText =
          `Comienza en ${hours}h ${minutes}m ${seconds}s`;
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    startCountdown("countdown1", 19, 0);
    startCountdown("countdown2", 21, 30);
  </script>
</body>
</html>
