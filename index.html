<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos en Vivo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1b2a;
      color: white;
    }
    .navbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background-color: #001427;
    }
    .navbar img {
      height: 40px;
    }
    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .player-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background: #111;
    }
    #video, iframe {
      width: 100%;
      height: 100%;
    }
    .events {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .event-card {
      background: #1b263b;
      border-radius: 10px;
      padding: 15px;
      width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    .event-card h3 {
      margin-bottom: 10px;
      text-align: center;
    }
    .countdown-box {
      background-color: #415a77;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 1.1em;
      margin-bottom: 12px;
      text-align: center;
    }
    .event-card button {
      padding: 8px 16px;
      background-color: #0077cc;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }
    .overlay-warning {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      color: white;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 10;
      padding: 20px;
    }
    .overlay-warning button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #ff4500;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .events {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <img src="logo.png" alt="Logo">
  </div>

  <div class="container">
    <div class="player-container">
      <div id="overlayWarning" class="overlay-warning">
        <div>
          <p>Este contenido puede tener anuncios tipo pop-up. ¿Desea continuar?</p>
          <button onclick="acceptWarning()">Aceptar</button>
        </div>
      </div>
      <div id="video"></div>
    </div>

    <div class="events">
      <!-- Evento 1 -->
      <div class="event-card">
        <h3>MLB: Pirates vs Reds</h3>
        <div id="timer1" class="countdown-box">Cargando...</div>
        <button onclick="loadIframe('https://streamtp4.com/global1.php?stream=mlb1', true)">Ver</button>
      </div>

      <!-- Evento 2 -->
      <div class="event-card">
        <h3>MLB: Yankees vs Rangers</h3>
        <div id="timer2" class="countdown-box">Cargando...</div>
        <button onclick="loadIframe('https://streamtp4.com/global1.php?stream=mlb11', true)">Ver</button>
      </div>

      <!-- Evento 3 -->
      <div class="event-card">
        <h3>NBA: Knicks vs Pacers</h3>
        <div id="timer3" class="countdown-box">Cargando...</div>
        <button onclick="loadClappr('https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8')">Ver</button>
      </div>

      <!-- Evento 4 -->
      <div class="event-card">
        <h3>AEW: Dynamite</h3>
        <div id="timer4" class="countdown-box">Cargando...</div>
        <button onclick="loadIframe('https://streamtp4.com/global1.php?stream=tsn2', true)">Ver</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script>
    const timers = [
      { id: 'timer1', time: '11:30' },
      { id: 'timer2', time: '18:00' },
      { id: 'timer3', time: '19:00' },
      { id: 'timer4', time: '19:00' }
    ];

    function updateTimers() {
      const now = new Date();
      const puertoRicoOffset = -4 * 60; // UTC-4
      const localOffset = now.getTimezoneOffset();
      const offsetDiff = (puertoRicoOffset - localOffset) * 60 * 1000;
      const nowPR = new Date(now.getTime() + offsetDiff);

      timers.forEach(timer => {
        const target = new Date(nowPR);
        const [h, m] = timer.time.split(':');
        target.setHours(parseInt(h), parseInt(m), 0, 0);

        const diff = target - nowPR;

        const el = document.getElementById(timer.id);
        if (diff <= 0) {
          el.textContent = '¡Ya comenzó!';
        } else {
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff / (1000 * 60)) % 60);
          const seconds = Math.floor((diff / 1000) % 60);
          el.textContent = `${hours}h ${minutes}m ${seconds}s`;
        }
      });
    }

    setInterval(updateTimers, 1000);
    updateTimers();

    function loadClappr(source) {
      document.getElementById('video').innerHTML = '';
      document.getElementById('overlayWarning').style.display = 'none';
      new Clappr.Player({
        source,
        parentId: "#video",
        width: "100%",
        height: "100%",
        autoPlay: true
      });
    }

    function loadIframe(url, needsWarning = false) {
      if (needsWarning) {
        const overlay = document.getElementById('overlayWarning');
        overlay.style.display = 'flex';
        overlay.dataset.url = url;
      } else {
        document.getElementById('video').innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%;height:100%"></iframe>`;
      }
    }

    function acceptWarning() {
      const overlay = document.getElementById('overlayWarning');
      const url = overlay.dataset.url;
      overlay.style.display = 'none';
      document.getElementById('video').innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%;height:100%"></iframe>`;
    }
  </script>
</body>
</html>
