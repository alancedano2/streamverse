<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos en Vivo</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111;
      font-family: 'Arial', sans-serif;
      color: white;
      padding-bottom: 50px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #000;
      padding: 10px 20px;
      border-bottom: 2px solid #333;
    }

    header img.logo {
      height: 40px;
    }

    header a.kqlogo img {
      height: 35px;
    }

    #player {
      width: 100%;
      max-width: 900px;
      height: 500px;
      margin: 20px auto;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    .eventos {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 900px;
      margin: 20px auto;
      padding: 0 10px;
    }

    .evento {
      background-color: #1c1c1c;
      padding: 15px 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .evento h2 {
      font-size: 20px;
      color: #f0f0f0;
    }

    .contador {
      font-size: 18px;
      font-weight: bold;
      color: #00ff99;
    }

    .evento button {
      background-color: #007bff;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      max-width: 100px;
    }

    .evento button:hover {
      background-color: #0056b3;
    }

    @media (max-width: 768px) {
      #player {
        height: 250px;
      }

      .evento {
        padding: 15px;
      }

      .evento h2 {
        font-size: 18px;
      }

      .contador {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" class="logo" />
    <a href="https://kq105.vercel.app" target="_blank" class="kqlogo">
      <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" alt="KQ105" />
    </a>
  </header>

  <div id="player"></div>

  <div class="eventos">
    <div class="evento">
      <h2>WWE SmackDown - 8:00pm</h2>
      <div class="contador" id="timer1">Cargando...</div>
      <button onclick="cambiarStream('https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8')">Ver WWE</button>
    </div>

    <div class="evento">
      <h2>NBA: Boston Celtics vs New York Knicks - 8:00pm</h2>
      <div class="contador" id="timer2">Cargando...</div>
      <button onclick="cambiarStream('https://socio.crackstreamslivehd.com/mlb1/tracks-v1a1/mono.m3u8?ip=204.2.91.238&token=813ffe4e0803ef9ecb91960737ba7c3b34d22dff-4b-1747512167-1747479767')">Ver</button>
    </div>
  </div>

  <script>
    const player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
    });

    function cambiarStream(nuevoStream) {
      player.load({ source: nuevoStream, mimeType: "application/x-mpegURL" });
    }

    function iniciarContadores() {
      const ahora = new Date();
      const hoy = ahora.toLocaleDateString('en-CA'); // YYYY-MM-DD

      const eventos = [
        {
          id: 'timer1',
          hora: `${hoy}T20:00:00`,
        },
        {
          id: 'timer2',
          hora: `${hoy}T20:00:00`,
        },
      ];

      eventos.forEach(evento => {
        const targetDate = new Date(evento.hora);
        setInterval(() => {
          const ahoraLocal = new Date();
          const diferencia = targetDate - ahoraLocal;

          const el = document.getElementById(evento.id);

          if (diferencia <= 0) {
            el.textContent = "¡En vivo!";
            return;
          }

          const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
          const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
          const segundos = Math.floor((diferencia / 1000) % 60);

          el.textContent = `Comienza en ${horas}h ${minutos}m ${segundos}s`;
        }, 1000);
      });
    }

    iniciarContadores();
  </script>
</body>
</html>
