<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamZone</title>
  <style>
    body {
      margin: 0;
      background: #0d1b2a;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    header {
      background: #1b263b;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }
    header img {
      height: 40px;
    }
    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .player-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    #player, iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    .events {
      display: grid;
      gap: 20px;
    }
    .event {
      background: #1e2a38;
      padding: 15px;
      border-radius: 12px;
    }
    .event h3 {
      margin: 0 0 5px;
    }
    .timer {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .event button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #00b4d8;
      color: white;
      cursor: pointer;
    }
    .overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .overlay button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #00b4d8;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo">
  </header>

  <div class="container">
    <div class="player-container">
      <div id="player"></div>
      <div class="overlay" id="warning">
        <p>Este contenido puede tener anuncios y ventanas emergentes. ¿Deseas continuar?</p>
        <button onclick="acceptWarning()">Aceptar</button>
      </div>
    </div>

    <div class="events" id="events"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script>
    const events = [
      {
        title: "MLB: Pittsburgh Pirates vs Cincinnati Reds",
        time: "2025-05-21T11:30:00",
        type: "iframe",
        src: "https://streamtp4.com/global1.php?stream=mlb1"
      },
      {
        title: "MLB: New York Yankees vs Texas Rangers",
        time: "2025-05-21T18:00:00",
        type: "iframe",
        src: "https://streamtp4.com/global1.php?stream=mlb11"
      },
      {
        title: "NBA: New York Knicks vs Indiana Pacers",
        time: "2025-05-21T19:00:00",
        type: "clappr",
        src: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8"
      },
      {
        title: "AEW: Dynamite",
        time: "2025-05-21T19:00:00",
        type: "iframe",
        src: "https://streamtp4.com/global1.php?stream=tsn2"
      }
    ];

    const eventsContainer = document.getElementById('events');
    const playerContainer = document.getElementById('player');
    const overlay = document.getElementById('warning');
    let pendingIframe = null;

    function renderEvents() {
      const now = new Date();
      eventsContainer.innerHTML = '';
      events.forEach((event, index) => {
        const startTime = new Date(event.time);
        let displayTime = '';
        if (now >= startTime) {
          displayTime = '¡Ya comenzó!';
        } else {
          const diff = startTime - now;
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          displayTime = `Comienza en ${hours}h ${minutes}m`;
        }

        const div = document.createElement('div');
        div.className = 'event';
        div.innerHTML = `
          <h3>${event.title}</h3>
          <div class="timer">${displayTime}</div>
          <button onclick="viewEvent(${index})">Ver</button>
        `;
        eventsContainer.appendChild(div);
      });
    }

    function viewEvent(index) {
      const event = events[index];
      if (event.type === 'clappr') {
        overlay.style.display = 'none';
        playerContainer.innerHTML = '<div id="player"></div>';
        new Clappr.Player({
          source: event.src,
          parentId: "#player",
          width: '100%',
          height: '100%'
        });
      } else if (event.type === 'iframe') {
        if (event.src.includes('streamtp4.com')) {
          overlay.style.display = 'flex';
          pendingIframe = event.src;
        } else {
          playerContainer.innerHTML = `<iframe src="${event.src}" frameborder="0" allowfullscreen></iframe>`;
        }
      }
    }

    function acceptWarning() {
      overlay.style.display = 'none';
      playerContainer.innerHTML = `<iframe src="${pendingIframe}" frameborder="0" allowfullscreen></iframe>`;
      pendingIframe = null;
    }

    renderEvents();
    setInterval(renderEvents, 60000);
  </script>
</body>
</html>
