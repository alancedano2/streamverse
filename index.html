<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos Deportivos</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #001f3f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      padding: 20px;
    }

    .player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: black;
      margin-bottom: 20px;
    }

    iframe, video {
      width: 100%;
      height: 100%;
      border: none;
    }

    #warning {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 5;
    }

    #warning.show {
      opacity: 1;
      pointer-events: all;
    }

    #warning button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #0074D9;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
    }

    .event {
      background: #003366;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event h2 {
      margin: 0;
      font-size: 20px;
    }

    .timer {
      font-size: 18px;
      background: #001f3f;
      padding: 8px 16px;
      border-radius: 8px;
      display: inline-block;
    }

    .event button {
      padding: 10px 16px;
      background: #2ECC40;
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }

      .event h2 {
        font-size: 16px;
      }

      .timer {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="player-container">
      <div id="warning">
        <p>⚠ Este contenido puede mostrar anuncios tipo <b>popup</b>. ¿Desea continuar?</p>
        <button onclick="acceptWarning()">Aceptar</button>
      </div>
      <div id="player"></div>
    </div>

    <div class="event">
      <h2>MLB: Pittsburgh Pirates vs Cincinnati Reds - 11:30am</h2>
      <div class="timer" id="timer1"></div>
      <button onclick="handleStream('https://streamtp4.com/global1.php?stream=mlb1')">Ver</button>
    </div>

    <div class="event">
      <h2>MLB: New York Yankees vs Texas Rangers - 6:00pm</h2>
      <div class="timer" id="timer2"></div>
      <button onclick="handleStream('https://streamtp4.com/global1.php?stream=mlb11')">Ver</button>
    </div>

    <div class="event">
      <h2>NBA: New York Knicks vs Indiana Pacers - 7:00pm</h2>
      <div class="timer" id="timer3"></div>
      <button onclick="handleStream('https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8')">Ver</button>
    </div>

    <div class="event">
      <h2>AEW: Dynamite - 7:00pm</h2>
      <div class="timer" id="timer4"></div>
      <button onclick="handleStream('https://streamtp4.com/global1.php?stream=tsn2')">Ver</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script>
    const warning = document.getElementById('warning');
    let pendingUrl = null;

    function acceptWarning() {
      warning.classList.remove('show');
      if (pendingUrl) loadPlayer(pendingUrl);
      pendingUrl = null;
    }

    function handleStream(url) {
      if (url.includes("streamtp4.com")) {
        warning.classList.add('show');
        pendingUrl = url;
      } else {
        loadPlayer(url);
      }
    }

    function loadPlayer(url) {
      const playerDiv = document.getElementById('player');
      playerDiv.innerHTML = "";

      if (url.endsWith('.m3u8')) {
        new Clappr.Player({
          source: url,
          parentId: "#player",
          width: "100%",
          height: "100%",
          autoPlay: true,
        });
      } else {
        playerDiv.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
      }
    }

    function updateTimers() {
      const events = [
        { id: 'timer1', hour: 11, minute: 30 },
        { id: 'timer2', hour: 18, minute: 0 },
        { id: 'timer3', hour: 19, minute: 0 },
        { id: 'timer4', hour: 19, minute: 0 },
      ];

      const now = new Date();
      const prTime = new Date(now.toLocaleString("en-US", { timeZone: "America/Puerto_Rico" }));

      events.forEach((e, i) => {
        const target = new Date(prTime);
        target.setHours(e.hour, e.minute, 0, 0);
        if (target < prTime) target.setDate(target.getDate() + 1);

        const diff = target - prTime;
        const hours = Math.floor(diff / 1000 / 60 / 60);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById(e.id).textContent = 
          `Empieza en: ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
      });
    }

    setInterval(updateTimers, 1000);
    updateTimers();
  </script>
</body>
</html>
