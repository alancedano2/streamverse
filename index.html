<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos en Vivo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #021428, #0b2440);
      color: #fff;
    }
    header {
      background-color: #00000080;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    header img {
      height: 40px;
    }
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
    }
    #player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
    }
    #warning {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    #warning.show {
      opacity: 1;
      pointer-events: all;
    }
    #warning button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .event {
      background: #0d1e33;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #00000055;
    }
    .event h3 {
      margin-top: 0;
    }
    .timer {
      font-size: 1.2em;
      margin: 10px 0;
    }
    .event button {
      padding: 10px 15px;
      background: #00aaff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" />
  </header>
  <div class="container">
    <div id="player-container">
      <div id="player"></div>
      <div id="warning">
        <p>Este contenido puede contener anuncios emergentes y ventanas popup. ¿Deseas continuar?</p>
        <button onclick="proceedWarning()">Aceptar</button>
      </div>
    </div>

    <div class="event">
      <h3>MLB: Pittsburgh Pirates vs Cincinnati Reds - 11:30am</h3>
      <div class="timer" id="timer1"></div>
      <button onclick="handleView('iframe', 'https://streamtp4.com/global1.php?stream=mlb1')">Ver</button>
    </div>

    <div class="event">
      <h3>MLB: New York Yankees vs Texas Rangers - 6:00pm</h3>
      <div class="timer" id="timer2"></div>
      <button onclick="handleView('iframe', 'https://streamtp4.com/global1.php?stream=mlb11')">Ver</button>
    </div>

    <div class="event">
      <h3>NBA: New York Knicks vs Indiana Pacers - 7:00pm</h3>
      <div class="timer" id="timer3"></div>
      <button onclick="handleView('clappr', 'https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8')">Ver</button>
    </div>

    <div class="event">
      <h3>AEW: Dynamite - 7:00pm</h3>
      <div class="timer" id="timer4"></div>
      <button onclick="handleView('iframe', 'https://streamtp4.com/global1.php?stream=tsn2')">Ver</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script>
    const playerDiv = document.getElementById("player");
    const warning = document.getElementById("warning");
    let pendingUrl = null, pendingType = null;

    function handleView(type, url) {
      if (url.includes("streamtp4.com")) {
        pendingUrl = url;
        pendingType = type;
        warning.classList.add("show");
      } else {
        loadPlayer(type, url);
      }
    }

    function proceedWarning() {
      warning.classList.remove("show");
      if (pendingUrl && pendingType) {
        loadPlayer(pendingType, pendingUrl);
        pendingUrl = null;
        pendingType = null;
      }
    }

    function loadPlayer(type, url) {
      playerDiv.innerHTML = "";
      if (type === "clappr") {
        new Clappr.Player({
          source: url,
          parentId: "#player",
          width: "100%",
          height: "100%",
        });
      } else if (type === "iframe") {
        const iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.allowFullscreen = true;
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "none";
        playerDiv.appendChild(iframe);
      }
    }

    function startTimer(id, hour, minute) {
      const timerEl = document.getElementById(id);
      function update() {
        const now = new Date();
        const target = new Date();
        target.setHours(hour, minute, 0, 0);
        if (now > target) target.setDate(target.getDate() + 1);
        const diff = target - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        timerEl.textContent = `Empieza en ${h}h ${m}m ${s}s`;
      }
      update();
      setInterval(update, 1000);
    }

    startTimer("timer1", 11, 30);
    startTimer("timer2", 18, 0);
    startTimer("timer3", 19, 0);
    startTimer("timer4", 19, 0);
  </script>
</body>
</html>
