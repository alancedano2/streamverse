<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stream Eventos</title>
<style>
  body {
    margin: 0; padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1E3C72, #2A5298);
    color: white;
  }
  /* Navbar */
  #navbar {
    height: 50px;
    background-color: #0D2240;
    display: flex;
    align-items: center;
    padding: 0 15px;
  }
  #navbar img {
    height: 36px;
  }
  /* Contenedor principal */
  #main {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
  }
  /* Zona eventos */
  #events {
    flex: 1 1 320px;
    max-width: 400px;
  }
  .event-card {
    background: rgba(255 255 255 / 0.1);
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 8px;
  }
  .event-title {
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 8px;
  }
  .timer-box {
    background: rgba(0,0,0,0.3);
    padding: 8px;
    border-radius: 5px;
    display: inline-block;
    font-family: monospace;
    font-size: 16px;
    margin-bottom: 10px;
  }
  button.view-btn {
    background-color: #ff9800;
    border: none;
    color: black;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.3s ease;
  }
  button.view-btn:hover {
    background-color: #e07b00;
  }

  /* Zona reproductor */
  #player {
    flex: 2 1 600px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    height: 360px;
    position: relative;
    overflow: hidden;
  }

  /* Advertencia modal */
  #warning-modal {
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background-color: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.4s forwards;
  }
  #warning-content {
    background: #222a40;
    padding: 25px 30px;
    border-radius: 10px;
    max-width: 320px;
    text-align: center;
    color: white;
    font-size: 16px;
  }
  #warning-content p {
    margin-bottom: 20px;
  }
  #warning-content button {
    margin: 0 10px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }
  #accept-btn {
    background-color: #4caf50;
    color: white;
  }
  #cancel-btn {
    background-color: #f44336;
    color: white;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity:1;}
  }

  /* Responsive */
  @media (max-width: 700px) {
    #main {
      flex-direction: column;
      padding: 15px;
    }
    #player {
      height: 240px;
      margin-top: 15px;
      max-width: 100%;
    }
    #events {
      max-width: 100%;
    }
  }
</style>
</head>
<body>

<div id="navbar">
  <img src="logo.png" alt="Logo" />
</div>

<div id="main">
  <div id="events">
    <!-- Eventos generados por JS -->
  </div>
  <div id="player">
    <!-- Aquí va el reproductor -->
  </div>
</div>

<!-- Modal de advertencia -->
<div id="warning-modal">
  <div id="warning-content">
    <p>Este contenido puede contener anuncios, popups y otros elementos molestos.<br>¿Deseas continuar viendo?</p>
    <button id="accept-btn">Aceptar</button>
    <button id="cancel-btn">Cancelar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
<script>
  const events = [
    {
      title: "MLB: Pittsburgh Pirates vs Cincinnati Reds",
      time: "11:30",
      type: "iframe",
      url: "https://streamtp4.com/global1.php?stream=mlb1"
    },
    {
      title: "MLB: New York Yankees vs Texas Rangers",
      time: "18:00",
      type: "iframe",
      url: "https://streamtp4.com/global1.php?stream=mlb11"
    },
    {
      title: "NBA: New York Knicks vs Indiana Pacers",
      time: "19:00",
      type: "clappr",
      url: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8"
    },
    {
      title: "AEW: Dynamite",
      time: "19:00",
      type: "iframe",
      url: "https://streamtp4.com/global1.php?stream=tsn2"
    }
  ];

  const eventsContainer = document.getElementById('events');
  const playerContainer = document.getElementById('player');
  const warningModal = document.getElementById('warning-modal');
  const acceptBtn = document.getElementById('accept-btn');
  const cancelBtn = document.getElementById('cancel-btn');

  let currentEventIndex = null;
  let clapprPlayer = null;

  // Función para calcular countdown (hora local)
  function getCountdown(targetHour, targetMinute) {
    const now = new Date();
    let target = new Date();
    target.setHours(targetHour, targetMinute, 0, 0);

    // Si la hora objetivo ya pasó hoy, no contamos para mañana (solo contamos el tiempo restante para hoy)
    if (now > target) {
      return null;
    }

    const diffMs = target - now;
    const hours = Math.floor(diffMs / (1000 * 60 * 60));
    const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);
    return { hours, minutes, seconds };
  }

  // Crear cada evento
  function createEventCard(event, index) {
    const card = document.createElement('div');
    card.className = 'event-card';

    const title = document.createElement('div');
    title.className = 'event-title';
    title.textContent = event.title;
    card.appendChild(title);

    const timerBox = document.createElement('div');
    timerBox.className = 'timer-box';
    timerBox.textContent = "Cargando...";
    card.appendChild(timerBox);

    const viewBtn = document.createElement('button');
    viewBtn.className = 'view-btn';
    viewBtn.textContent = 'Ver';
    card.appendChild(viewBtn);

    // Actualizar cuenta regresiva cada segundo
    function updateTimer() {
      const timeParts = event.time.split(':');
      const countdown = getCountdown(parseInt(timeParts[0]), parseInt(timeParts[1]));
      if (countdown) {
        timerBox.textContent = `${String(countdown.hours).padStart(2,'0')} : ${String(countdown.minutes).padStart(2,'0')} : ${String(countdown.seconds).padStart(2,'0')}`;
      } else {
        timerBox.textContent = 'Evento en curso o terminado';
      }
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    // Manejo botón ver
    viewBtn.addEventListener('click', () => {
      currentEventIndex = index;
      if(event.type === 'iframe') {
        // Mostrar advertencia
        warningModal.style.display = 'flex';
        fadeIn(warningModal);
      } else {
        loadClapprPlayer(event.url);
      }
    });

    return card;
  }

  // Cargar Clappr player
  function loadClapprPlayer(url) {
    playerContainer.innerHTML = '';
    if(clapprPlayer) {
      clapprPlayer.destroy();
      clapprPlayer = null;
    }
    clapprPlayer = new Clappr.Player({
      source: url,
      parentId: '#player',
      width: '100%',
      height: '100%',
      autoPlay: true,
      mute: false,
      playback: { 
        hlsjsConfig: { 
          // Optional HLS.js options here 
        } 
      }
    });
  }

  // Cargar iframe
  function loadIframe(url) {
    playerContainer.innerHTML = '';
    if(clapprPlayer) {
      clapprPlayer.destroy();
      clapprPlayer = null;
    }
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.width = '100%';
    iframe.height = '100%';
    iframe.frameBorder = '0';
    iframe.allowFullscreen = true;
    iframe.sandbox = "allow-scripts allow-same-origin allow-presentation";
    playerContainer.appendChild(iframe);
  }

  // Fade In effect
  function fadeIn(element) {
    element.style.opacity = 0;
    let op = 0;
    element.style.display = 'flex';
    const timer = setInterval(() => {
      if(op >= 1){
        clearInterval(timer);
      }
      element.style.opacity = op;
      op += 0.1;
    }, 30);
  }
  // Fade Out effect
  function fadeOut(element) {
    let op = 1;
    const timer = setInterval(() => {
      if(op <= 0){
        clearInterval(timer);
        element.style.display = 'none';
      }
      element.style.opacity = op;
      op -= 0.1;
    }, 30);
  }

  // Manejo botones modal
  acceptBtn.addEventListener('click', () => {
    fadeOut(warningModal);
    const event = events[currentEventIndex];
    loadIframe(event.url);
  });

  cancelBtn.addEventListener('click', () => {
    fadeOut(warningModal);
  });

  // Cargar eventos al DOM
  events.forEach((ev, i) => {
    const card = createEventCard(ev, i);
    eventsContainer.appendChild(card);
  });

</script>
</body>
</html>
