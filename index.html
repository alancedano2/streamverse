<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    header {
      background-color: #001f3f;
      padding: 0.4rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 50px;
    }

    .logo-left {
      max-width: 220px;
      filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.5));
      height: 40px;
      object-fit: contain;
    }

    .logo-right-link {
      display: inline-block;
      height: 40px;
    }

    .logo-right-link img {
      height: 100%;
      object-fit: contain;
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    h2 {
      border-bottom: 2px solid #00adb5;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .countdown {
      margin-top: 0.5rem;
      background: #00adb5;
      color: #001f3f;
      font-weight: bold;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      display: inline-block;
      min-width: 140px;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .right-panel {
        max-height: none;
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo StreamVerse" class="logo-left" />
    <a href="https://kq105.vercel.app" target="_blank" rel="noopener" class="logo-right-link">
      <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" alt="KQ105" />
    </a>
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Eventos</h2>

      <div class="event-card">
        <h3>🏀 NBA – Boston Celtics vs New York Knicks</h3>
        <p>Hora: 7:00 p.m.</p>
        <div class="countdown" id="countdown-1">Cargando...</div>
      </div>

      <div class="event-card">
        <h3>🏀 NBA – Golden State Warriors vs Minnesota Timberwolves</h3>
        <p>Hora: 9:30 p.m.</p>
        <div class="countdown" id="countdown-2">Cargando...</div>
      </div>
    </div>
  </div>

  <script>
    var player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    function getPuertoRicoTime() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Puerto_Rico",
        hour12: false,
        year: "numeric",
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "numeric",
        second: "numeric"
      });
      const parts = formatter.formatToParts(now);

      let year, month, day, hour, minute, second;
      for (const part of parts) {
        switch(part.type) {
          case "year": year = parseInt(part.value); break;
          case "month": month = parseInt(part.value); break;
          case "day": day = parseInt(part.value); break;
          case "hour": hour = parseInt(part.value); break;
          case "minute": minute = parseInt(part.value); break;
          case "second": second = parseInt(part.value); break;
        }
      }

      return new Date(year, month - 1, day, hour, minute, second);
    }

    function startCountdown(id, targetHour, targetMinute) {
      const countdownEl = document.getElementById(id);

      function updateCountdown() {
        const nowPR = getPuertoRicoTime();

        // Creamos fecha objetivo para hoy en PR
        let targetDate = new Date(
          nowPR.getFullYear(),
          nowPR.getMonth(),
          nowPR.getDate(),
          targetHour,
          targetMinute,
          0
        );

        // Si ya pasó la hora, sumamos un día (mostrará tiempo para el evento de mañana)
        if (nowPR > targetDate) {
          targetDate.setDate(targetDate.getDate() + 1);
        }

        let diff = targetDate - nowPR; // ms

        if (diff <= 0) {
          countdownEl.textContent = "¡En vivo ahora!";
          return;
        }

        let seconds = Math.floor(diff / 1000) % 60;
        let minutes = Math.floor(diff / (1000 * 60)) % 60;
        let hours = Math.floor(diff / (1000 * 60 * 60));

        countdownEl.textContent =
          (hours < 10 ? "0" + hours : hours) + ":" +
          (minutes < 10 ? "0" + minutes : minutes) + ":" +
          (seconds < 10 ? "0" + seconds : seconds);
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    startCountdown("countdown-1", 19, 0);   // 7:00 p.m.
    startCountdown("countdown-2", 21, 30);  // 9:30 p.m.
  </script>
</body>
</html>
