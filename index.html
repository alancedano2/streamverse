<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    /* Navbar */
    nav {
      background-color: #001f3f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.3rem 1rem;
      height: 50px;
      box-sizing: border-box;
    }

    .nav-left img.logo {
      max-width: 220px;
      max-height: 40px;
      filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.5));
    }

    .nav-right a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #00adb5;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .nav-right a img {
      height: 24px;
      width: auto;
      filter: drop-shadow(0 0 2px rgba(0, 173, 181, 0.8));
    }

    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    h2 {
      border-bottom: 2px solid #00adb5;
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
      margin-bottom: 0.5rem;
    }

    .countdown {
      font-size: 1.2rem;
      font-weight: bold;
      background: #00adb5;
      color: #001f3f;
      padding: 0.3rem 0.6rem;
      border-radius: 8px;
      display: inline-block;
      min-width: 110px;
      text-align: center;
      user-select: none;
    }

    /* Responsive */

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        padding: 0.5rem;
      }

      .right-panel {
        max-height: none;
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>

  <nav>
  <div class="nav-left">
    <img src="logo.png" alt="Logo" class="logo" />
  </div>
  <div class="nav-right">
    <a href="https://kq105.vercel.app" target="_blank" rel="noopener noreferrer">
      KQ105
      <img
        src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184"
        alt="KQ105 Logo"
        style="cursor:pointer;"
      />
    </a>
  </div>
</nav>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Próximos Eventos</h2>

      <div class="event-card">
        <h3>🏀 NBA - Boston Celtics vs New York Knicks</h3>
        <p><strong>Hora:</strong> 7:00 p.m. (Puerto Rico)</p>
        <div>Inicia en: <span id="countdown1" class="countdown">Cargando...</span></div>
      </div>

      <div class="event-card">
        <h3>🏀 NBA - Golden State Warriors vs Minnesota Timberwolves</h3>
        <p><strong>Hora:</strong> 9:30 p.m. (Puerto Rico)</p>
        <div>Inicia en: <span id="countdown2" class="countdown">Cargando...</span></div>
      </div>
    </div>
  </div>

  <script>
    // Inicializa el reproductor Clappr
    var player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    // Obtiene la hora actual en Puerto Rico (UTC-4, sin horario de verano)
    function getCurrentPRTime() {
      const nowUTC = new Date(new Date().toISOString());
      const prOffset = -4 * 60; // minutos
      return new Date(nowUTC.getTime() + prOffset * 60 * 1000);
    }

    function startCountdown(id, eventHour, eventMinute) {
      const countdownElem = document.getElementById(id);

      function updateCountdown() {
        const now = getCurrentPRTime();
        let eventTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), eventHour, eventMinute, 0);

        if (now > eventTime) {
          eventTime.setDate(eventTime.getDate() + 1);
        }

        const diff = eventTime - now;

        if (diff <= 0) {
          countdownElem.textContent = "¡Ya comenzó!";
          return;
        }

        const hours = String(Math.floor(diff / (1000 * 60 * 60))).padStart(2, "0");
        const minutes = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, "0");
        const seconds = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, "0");

        countdownElem.textContent = `${hours}:${minutes}:${seconds}`;
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    startCountdown("countdown1", 19, 0);
    startCountdown("countdown2", 21, 30);
  </script>

</body>
</html>
