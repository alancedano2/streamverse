<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamVerse</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a1f44, #0f3460);
      color: #fff;
    }

    /* Navbar */
    header {
      background-color: #001f3f;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      height: 60px;
    }

    .logo-left {
      max-width: 220px;
      filter: drop-shadow(0px 0px 6px rgba(255,255,255,0.5));
      cursor: default;
    }

    .kq105-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .kq105-logo {
      max-height: 30px;
      width: auto;
      filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.6));
    }

    /* Layout */
    .container {
      display: flex;
      flex-direction: row;
      padding: 1rem;
      gap: 1rem;
    }

    .left-panel {
      flex: 3;
      background-color: #112d4e;
      padding: 1rem;
      border-radius: 12px;
    }

    .right-panel {
      flex: 1;
      background-color: #1f4068;
      padding: 1rem;
      border-radius: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #player {
      width: 100%;
      aspect-ratio: 16 / 9;
      margin-bottom: 1rem;
      border-radius: 10px;
      overflow: hidden;
    }

    .event-card {
      background-color: #0f3057;
      margin-bottom: 1rem;
      padding: 1rem;
      border-left: 4px solid #00adb5;
      border-radius: 10px;
    }

    .event-card h3 {
      margin-top: 0;
      color: #00fff5;
    }

    .timer-box {
      margin-top: 0.5rem;
      background: #16213e;
      padding: 0.5rem;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      color: #00adb5;
      letter-spacing: 1px;
      user-select: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .right-panel {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Logo" class="logo-left" />
    <a href="https://kq105.vercel.app" target="_blank" rel="noopener" class="kq105-link">
      <img src="https://bloximages.chicago2.vip.townnews.com/kq105.com/content/tncms/custom/image/f8b14b8c-a5ba-11ee-b21a-4b46656e8613.png?resize=640%2C184" alt="KQ105" class="kq105-logo" />
      KQ105
    </a>
  </header>

  <div class="container">
    <div class="left-panel">
      <div id="player"></div>
    </div>

    <div class="right-panel">
      <h2>🎬 Eventos</h2>

      <div class="event-card">
        <h3>🏀 NBA - Boston Celtics vs New York Knicks</h3>
        <div>Hora: 7:00 p.m.</div>
        <div id="timer1" class="timer-box">Cargando...</div>
      </div>

      <div class="event-card">
        <h3>🏀 NBA - Golden State Warriors vs Minnesota Timberwolves</h3>
        <div>Hora: 9:30 p.m.</div>
        <div id="timer2" class="timer-box">Cargando...</div>
      </div>
    </div>
  </div>

  <script>
    var player = new Clappr.Player({
      source: "https://giatv.bozztv.com/giatv/giatv-PPVDeportes2/PPVDeportes2/playlist.m3u8",
      parentId: "#player",
      width: "100%",
      height: "100%",
      autoPlay: true,
      mute: false,
    });

    function getPuertoRicoTime() {
      // Usa Intl para obtener hora en zona America/Puerto_Rico
      const now = new Date();
      const prTime = now.toLocaleString("es-US", {timeZone: "America/Puerto_Rico"});
      return new Date(prTime);
    }

    function updateTimer(eventHour, eventMinute, elementId) {
      const timerEl = document.getElementById(elementId);

      function update() {
        const now = getPuertoRicoTime();
        const eventTime = new Date(now);
        eventTime.setHours(eventHour, eventMinute, 0, 0);

        let diff = eventTime - now;

        if (diff < 0) {
          // Evento ya comenzó, mostrar mensaje y parar el timer
          timerEl.textContent = "El evento ya comenzó";
          clearInterval(intervalId);
          return;
        }

        const hrs = Math.floor(diff / (1000 * 60 * 60));
        diff -= hrs * (1000 * 60 * 60);
        const mins = Math.floor(diff / (1000 * 60));
        diff -= mins * (1000 * 60);
        const secs = Math.floor(diff / 1000);

        timerEl.textContent = `${hrs.toString().padStart(2,'0')}h : ${mins.toString().padStart(2,'0')}m : ${secs.toString().padStart(2,'0')}s`;
      }

      update();
      const intervalId = setInterval(update, 1000);
    }

    // Inicializa los timers con las horas correctas en PR (7:00 pm y 9:30 pm)
    updateTimer(19, 0, "timer1");
    updateTimer(21, 30, "timer2");
  </script>
</body>
</html>
